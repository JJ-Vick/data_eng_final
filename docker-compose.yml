services:
  db:
    image: postgres:15
    container_name: project_db_container
    environment:
      POSTGRES_DB: project_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: adminer_container
    ports:
      - "8080:8080"

volumes:
  db_data: